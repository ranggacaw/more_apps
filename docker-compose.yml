services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: more-clinic-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - pgsql

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: more-clinic-queue
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - pgsql

  nginx:
    image: nginx:1.27-alpine
    container_name: more-clinic-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  pgsql:
    image: postgres:17-alpine
    container_name: more-clinic-pgsql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: more_clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - pgsql-data:/var/lib/postgresql/data

volumes:
  pgsql-data:
